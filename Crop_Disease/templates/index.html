<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crop Disease Detection</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg p-4">

                <h2 class="text-center text-success mb-4">
                    🌱 Crop Disease Detection System
                </h2>

                <form id="uploadForm" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label">Upload Leaf Image</label>
                        <input type="file" name="image" id="imageInput" class="form-control" required>
                    </div>

                    <!-- Image Preview -->
                    <div class="text-center mb-3">
                        <img id="preview" src="" class="img-fluid rounded d-none" style="max-height:200px;">
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-success btn-lg" type="submit">
                            Detect Disease
                        </button>
                    </div>

                </form>

                <!-- Loading Spinner -->
                <div id="loading" class="text-center mt-3 d-none">
                    <div class="spinner-border text-success" role="status"></div>
                    <p>Detecting disease...</p>
                </div>

                <!-- Result -->
                <div id="result" class="mt-4 text-center"></div>
                <hr>
<h5 class="text-center mt-3">📊 Prediction History</h5>

<ul id="history" class="list-group mt-2"></ul>

            </div>

        </div>
    </div>

</div>

<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const loading = document.getElementById("loading");
const resultDiv = document.getElementById("result");
const historyList = document.getElementById("history");

// Image preview
imageInput.addEventListener("change", function(){
    const file = this.files[0];
    if(file){
        preview.src = URL.createObjectURL(file);
        preview.classList.remove("d-none");
    }
});

// Submit form
document.getElementById("uploadForm").addEventListener("submit", async function(e){
    e.preventDefault();

    loading.classList.remove("d-none");
    resultDiv.innerHTML = "";

    let formData = new FormData(this);

    let response = await fetch("/predict", {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    loading.classList.add("d-none");

    resultDiv.innerHTML = `
        <div class="alert alert-success">
            <h5>Disease: ${data.disease}</h5>
            <p>Confidence: ${data.confidence}</p>
            <p><b>Remedy:</b> ${data.remedy}</p>
        </div>
    `;

    // Add to history
    let item = document.createElement("li");
    item.className = "list-group-item";
    item.innerHTML = `
        <b>${data.disease}</b> - ${data.confidence}
    `;
    historyList.prepend(item);
});
</script>


</body>
</html>
